version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: chainsight_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chainsight_db
      POSTGRES_USER: chainsight_user
      POSTGRES_PASSWORD: chainsight_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chainsight_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
